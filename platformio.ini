; ===== PlatformIO =====

; ---- ENTORNO BASE (común a USB, UART y OTA) ----
[env_base]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
board_build.f_cpu = 240000000L

; Forzamos que TFT_eSPI use TU User_Setup.h sin editar la librería
build_flags =
  -include include/User_Setup.h
  -D USER_SETUP_LOADED=1
  -I include
  ; -Wall
  ; -Wextra
  ; -Wuninitialized
  ; -Wunused-function
  ; -Wunused-variable
  ; -ffunction-sections
  ; -fdata-sections
  ; -Wl,--gc-sections

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Rutas extra de librerías
; IMPORTANTE: dejo esto EXACTAMENTE como en tu original
lib_extra_dirs = ~/Documents/Arduino/libraries lib/DOITlib/ include lib/PN532 lib/PN532/PN532_I2C lib/PN532/PN532 lib/PN532/PN532_SPI

; Dependencias
lib_deps =
  mbed-tomasero/Adafruit_NeoPixel
  madhephaestus/ESP32Encoder@^0.10.2
  adafruit/Adafruit GFX Library@^1.11.9
  adafruit/Adafruit BusIO@^1.16.0
  Wire
  SPI
  FS
  SPIFFS
  adafruit/Adafruit ADXL345@^1.3.4
  bodmer/TFT_eSPI@^2.5.43
  fastled/FastLED@3.6.0
  EEPROM
  adafruit/Adafruit Unified Sensor@^1.1.15
  dfrobot/DFRobotDFPlayerMini@^1.0.5
  kosme/arduinoFFT@^1.5.6
  arduinoFFT
  adafruit/Adafruit PN532@^1.3.4
  https://github.com/don/NDEF.git


; ============================================================
; UART / PROGRAMADOR EXTERNO - COM5
; Este debe comportarse como tu entorno original
; ============================================================
[env:uart_com5]
extends = env_base
build_type = debug

build_flags =
  ${env_base.build_flags}
  -D BOTONERA_NEW

upload_port = COM6
monitor_port = COM6

debug_init_break = tbreak setup
debug_speed = 40000


; ============================================================
; USB NATIVO ESP32-S3 - COM10
; ============================================================
[env:usb_native_com10]
extends = env_base
build_type = debug

build_flags =
  ${env_base.build_flags}
  -D BOTONERA_NEW
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1

upload_port = COM10
monitor_port = COM10

debug_init_break = tbreak setup
debug_speed = 40000


; ============================================================
; OTA
; ============================================================
[env:wifi_prog]
extends = env_base

build_flags =
  ${env_base.build_flags}
  -D BOTONERA_NEW

upload_protocol = espota
upload_port = 200.200.200.1
upload_flags =
  --auth=wakeupneo

monitor_port = COM6